server {
	server_name overviewer.daktoinc.co.uk;

                listen 443 ssl;
                listen [::]:443 ssl;
                ssl_certificate /etc/cloudflare/pem;
                ssl_certificate_key /etc/cloudflare/key;
                #charset koi8-r;

                #access-log logs/host.access.log main;

		location / {
			alias /srv/overviewer/;
			index index.html;
			try_files $uri $uri/ =404;
		}
		
		location /dynmap-api/ {
			proxy_pass http://127.0.0.1:8123/up/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}
}
